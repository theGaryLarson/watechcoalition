name: Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.0.0"

      - name: Install Dependencies
        run: npm install

      - name: Run Build
        env:
          AZURE_STORAGE_ACCOUNT_KEY: "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}"
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=mockBlobStorage;AccountKey=Ju$t@Mock|<3YJu$t@Mock|<3YJu$t@Mock|<3Y==;EndpointSuffix=core.windows.net"
          AZURE_STORAGE_NAME: "${{ secrets.AZURE_STORAGE_NAME }}"
        run: npm run build

  python-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agents

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect test files
        id: detect-tests
        run: |
          if find tests/ -name 'test_*.py' -o -name '*_test.py' 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No test files found — skipping lint and pytest"
          fi

      - name: Lint with ruff
        if: steps.detect-tests.outputs.has_tests == 'true'
        run: ruff check .

      - name: Run pytest
        if: steps.detect-tests.outputs.has_tests == 'true'
        run: pytest tests/ -v
